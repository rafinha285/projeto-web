<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Mikrolabs Viagem 123 — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/login.css}" href="/assets/login/login.css" />
</head>
<body>

  <div class="bg-map"></div>
  <div class="bg-overlay"></div>

  <div class="split">

    <!-- LEFT PANEL -->
    <div class="panel-left">
      <div class="brand">
        <span class="brand-icon">✈</span>
        <div>
          <div class="brand-name">Mikrolabs</div>
          <div class="brand-sub">Viagem 123</div>
        </div>
      </div>

      <div class="hero-text">
        <p class="hero-tagline">Sua próxima</p>
        <h1 class="hero-title">aventura<br/><em>começa aqui.</em></h1>
        <p class="hero-desc">Planeje, reserve e explore destinos incríveis com total praticidade.</p>
      </div>

      <div class="destinations">
        <span class="dest-badge">🗼 Paris</span>
        <span class="dest-badge">🌴 Bali</span>
        <span class="dest-badge">🏔 Patagônia</span>
        <span class="dest-badge">🌊 Maldivas</span>
      </div>
    </div>

    <!-- RIGHT PANEL (FORM) -->
    <div class="panel-right">
      <div class="card">
        <div class="card-header">
          <h2>Bem-vindo de volta</h2>
          <p>Acesse sua conta para continuar</p>
        </div>

        <form id="loginForm" method="post" th:action="@{/login}" action="/login" novalidate>

          <div class="field" id="field-email">
            <label for="email">E-mail</label>
            <div class="input-wrap">
              <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email"/>
              <span class="input-icon">✉</span>
            </div>
            <span class="field-error" id="error-email"></span>
          </div>

          <div class="field" id="field-password">
            <label for="password">Senha</label>
            <div class="input-wrap">
              <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar senha">👁</button>
            </div>
            <span class="field-error" id="error-password"></span>
          </div>

          <div class="row-options">
            <label class="remember">
              <input type="checkbox" id="remember" />
              <span class="check-box"></span>
              Lembrar de mim
            </label>
            <a href="#" class="forgot">Esqueci a senha</a>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">
            <span class="btn-text">Entrar</span>
            <span class="btn-loader" id="btnLoader"></span>
          </button>

          <div class="divider"><span>ou</span></div>

          <div class="signup-row">
            Não tem conta? <a th:href="@{/register}" href="/register">Cadastre-se</a>
          </div>

        </form>
      </div>
    </div>

  </div>
    <script th:src="@{/js/login.js}" src="/assets/login/login.js"></script>
</body>
</html>
